name: Build desktop

# Verifies the example app compiles on all three desktop platforms.
# Runs on pull requests; pushes to main are covered by the release workflow.

on:
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-windows-desktop
      - working-directory: example
        run: flutter pub get
      - working-directory: example
        run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-player-windows
          path: example/build/windows/x64/runner/Release/

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # media_kit needs mpv + the desktop build toolchain.
      - run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-linux-desktop
      - working-directory: example
        run: flutter pub get
      - working-directory: example
        run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-player-linux
          path: example/build/linux/x64/release/bundle/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-macos-desktop
      - working-directory: example
        run: flutter pub get
      - working-directory: example
        run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: youtube-player-macos
          path: example/build/macos/Build/Products/Release/example.app
